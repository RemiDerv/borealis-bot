name: Appel du site 13

on:
  schedule:
    - cron: '*/27 * * * *'
  workflow_dispatch:

jobs:
  visit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python bot.py
